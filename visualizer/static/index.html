<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raft Playground</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <header class="sidebar-header">
        <h1>Raft Playground</h1>
      </header>

      <section class="panel">
        <h2>Cluster</h2>
        <label class="field inline">
          <span>Nodes</span>
          <input type="range" id="node-count" min="3" max="9" value="5">
          <output id="node-count-val">5</output>
        </label>
        <div class="btn-row">
          <button id="btn-create" class="btn secondary">Configure</button>
          <button id="btn-start" class="btn primary">Start</button>
          <button id="btn-stop" class="btn danger" disabled>Stop</button>
        </div>
        <div id="cluster-health" class="health-chip">Not started</div>
      </section>

      <section class="panel">
        <h2>Write</h2>
        <label class="field">
          <span>Node</span>
          <select id="target-node"></select>
        </label>
        <label class="field">
          <span>Key</span>
          <input type="text" id="req-key" placeholder="user:1">
        </label>
        <label class="field">
          <span>Value</span>
          <input type="text" id="req-value" placeholder="alice">
        </label>
        <div class="btn-row">
          <button id="btn-put" class="btn primary" disabled>Write</button>
          <button id="btn-get" class="btn secondary" disabled>Read</button>
        </div>
      </section>

      <p class="grafana-link"><a id="grafana-link" href="http://localhost:3000" target="_blank" rel="noopener">Open Grafana dashboard</a></p>

      <details id="advanced" class="panel advanced">
        <summary>Advanced</summary>
        <div class="advanced-body">
          <p class="hint">Click a node card to select it.</p>
          <div id="selected-node" class="selected-node">None selected</div>
          <div class="btn-row">
            <button id="btn-kill" class="btn danger" disabled>Kill</button>
            <button id="btn-restart" class="btn secondary" disabled>Restart</button>
            <button id="btn-partition" class="btn danger" disabled>Isolate</button>
            <button id="btn-clear-partition" class="btn ghost" disabled>Clear partition</button>
          </div>
          <label class="field">
            <span>Guided tour</span>
            <select id="tour-select">
              <option value="">Choose...</option>
              <option value="visualizer/scenarios/election.json">Leader election</option>
              <option value="visualizer/scenarios/failure.json">Leader failure</option>
              <option value="visualizer/scenarios/partition.json">Network partition</option>
              <option value="visualizer/scenarios/persistence.json">Persistence</option>
            </select>
          </label>
          <div class="btn-row">
            <button id="btn-tour-load" class="btn secondary">Load</button>
            <button id="btn-tour-run" class="btn primary" disabled>Run</button>
            <button id="btn-tour-pause" class="btn ghost" disabled>Pause</button>
          </div>
          <div id="event-log" class="event-log"></div>
        </div>
      </details>
    </aside>

    <main id="main">
      <div id="hud">
        <span>Term <strong id="hud-term">-</strong></span>
        <span>Commit <strong id="hud-commit">-</strong></span>
        <span>Leader <strong id="hud-leader">-</strong></span>
        <span>Quorum <strong id="hud-quorum">-</strong></span>
      </div>

      <div id="node-grid"></div>

      <section id="metrics-panel">
        <h2>Metrics</h2>
        <p class="metrics-hint">Start monitoring stack: <code>docker compose -f monitoring/docker-compose.yml up</code></p>
        <div class="metrics-grid">
          <iframe id="panel-commit" title="Commit index" src="about:blank" loading="lazy"></iframe>
          <iframe id="panel-lag" title="Replication lag" src="about:blank" loading="lazy"></iframe>
          <iframe id="panel-term" title="Raft term" src="about:blank" loading="lazy"></iframe>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
